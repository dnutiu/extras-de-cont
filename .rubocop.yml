AllCops:
  NewCops: enable
Style/StringLiterals:
  EnforcedStyle: double_quotes
Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
Metrics/ClassLength:
  Max: 500
  Exclude:
    - 'test/**/*.rb'
Metrics/MethodLength:
  Max: 100
  Exclude:
    - 'test/**/*.rb'
Metrics/AbcSize:
  Max: 50
  Exclude:
    - 'test/**/*.rb'
Metrics/CyclomaticComplexity:
  Max: 30
  Exclude:
    - 'test/**/*.rb'
Metrics/PerceivedComplexity:
  Max: 30
  Exclude:
    - 'test/**/*.rb'